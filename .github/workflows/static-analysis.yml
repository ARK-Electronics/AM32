name: Static analysis

on:
  push:
    branches: [main, ark-release]
  pull_request:
  workflow_dispatch:

jobs:
  cppcheck:
    name: cppcheck (ARK F051 control path)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
          cppcheck --version

      - name: Run cppcheck
        run: make cppcheck

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-ark-report
          path: obj/cppcheck-ark.txt
          if-no-files-found: ignore
          retention-days: 14
