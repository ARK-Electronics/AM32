name: Static analysis

on:
  push:
    branches: [main, ark-release]
  pull_request:
  workflow_dispatch:

jobs:
  format:
    name: clang-format (check_format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          python3 -m pip install --user 'clang-format==22.1.5'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          clang-format --version

      - name: Check formatting
        run: make check_format

  cppcheck:
    name: cppcheck (ARK F051 control path)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
          cppcheck --version

      - name: Run cppcheck
        run: make cppcheck

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-ark-report
          path: obj/cppcheck-ark.txt
          if-no-files-found: ignore
          retention-days: 14

  size-ark:
    name: size gate (ARK F051 + HWCI_PERF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Arm toolchain
        run: make arm_sdk_install

      - name: Build ARK + size check
        run: make size-check-ark -j$(nproc)

      - name: Upload ARK binary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ark-f051-hwci-perf
          path: |
            obj/AM32_ARK_4IN1_F051_*.elf
            obj/AM32_ARK_4IN1_F051_*.bin
          if-no-files-found: ignore
          retention-days: 14
