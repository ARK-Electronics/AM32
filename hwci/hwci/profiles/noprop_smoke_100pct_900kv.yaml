name: noprop_smoke_100pct_900kv
description: >
  No-prop free-run climb to 100% for ~900KV motors on 6S. Same staircase as
  the 1300KV smoke; min_rpm gates scaled by 900/1300. Expect free-run near
  Kv*V ≈ 22k mech at full throttle on 6S. ~55 s.
sample_rate_hz: 100
arm_settle_s: 3.0
pole_pairs: 7
demag_rpm_drop_fraction: 0.25
demag_commutation_spike: 3.0
steady_tail_fraction: 0.5

safety:
  max_current_a: 20.0
  max_motor_temp_c: 90.0
  max_rpm: 35000
  max_thrust_n: 2.0

smoke_gates:
  enabled: true
  min_throttle: 0.55
  min_running_fraction: 0.90
  max_bemf_latch_samples: 0
  require_esc_drive_states: true
  min_esc_drive_fraction: 0.90
  max_illegal_edges: 0
  # Scaled ~900/1300 from the 1300KV gates
  min_rpm:
    0.6: 7600
    0.8: 12400
    1.0: 15200

segments:
  - {label: idle,    throttle: 0.00, duration_s: 2.0}
  - {label: ramp20,  throttle: 0.20, duration_s: 3.0, ramp: true}
  - {label: hold20,  throttle: 0.20, duration_s: 3.0, steady: true}
  - {label: ramp40,  throttle: 0.40, duration_s: 4.0, ramp: true}
  - {label: hold40,  throttle: 0.40, duration_s: 3.0, steady: true}
  - {label: ramp60,  throttle: 0.60, duration_s: 4.0, ramp: true}
  - {label: hold60,  throttle: 0.60, duration_s: 3.0, steady: true}
  - {label: ramp80,  throttle: 0.80, duration_s: 4.0, ramp: true}
  - {label: hold80,  throttle: 0.80, duration_s: 3.0, steady: true}
  - {label: ramp100, throttle: 1.00, duration_s: 8.0, ramp: true}
  - {label: hold100, throttle: 1.00, duration_s: 5.0, steady: true}
  - {label: rampdn,  throttle: 0.00, duration_s: 5.0, ramp: true}
  - {label: stop,    throttle: 0.00, duration_s: 2.0}
