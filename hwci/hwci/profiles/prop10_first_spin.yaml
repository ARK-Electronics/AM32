name: prop10_first_spin
description: >
  First powered spin of a NEW prop pairing: 900KV + HQProp 10x5x3 on 6S.
  Two gentle holds (10/15%) to sanity-check thrust sign/magnitude, current,
  and wake direction before any staircase. Tight aborts - a 10" prop makes
  real thrust fast.
sample_rate_hz: 100
arm_settle_s: 3.0
pole_pairs: 7
steady_tail_fraction: 0.5

safety:
  max_current_a: 10.0
  max_motor_temp_c: 75.0
  max_rpm: 6000
  max_thrust_n: 12.0

smoke_gates:
  enabled: true
  min_throttle: 0.08
  min_running_fraction: 0.85
  max_bemf_latch_samples: 0
  require_esc_drive_states: true
  min_esc_drive_fraction: 0.85
  max_illegal_edges: 0
  min_rpm:
    0.10: 1200
    0.15: 2000

segments:
  - {label: idle,    throttle: 0.00, duration_s: 2.0}
  - {label: ramp10,  throttle: 0.10, duration_s: 3.0, ramp: true}
  - {label: hold10,  throttle: 0.10, duration_s: 5.0, steady: true}
  - {label: ramp15,  throttle: 0.15, duration_s: 2.0, ramp: true}
  - {label: hold15,  throttle: 0.15, duration_s: 5.0, steady: true}
  - {label: rampdn,  throttle: 0.00, duration_s: 3.0, ramp: true}
  - {label: stop,    throttle: 0.00, duration_s: 2.0}
