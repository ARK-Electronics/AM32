name: prop10_smoke_50pct
description: >
  Propped smoke staircase for 900KV + HQProp 10x5x3 on 6S, capped at 50%
  throttle per bench directive. Slow ramps (accel transients on a pack are
  large), steady holds for per-point metrics. Run prop10_first_spin and
  review its numbers before this.
sample_rate_hz: 100
arm_settle_s: 3.0
pole_pairs: 7
demag_rpm_drop_fraction: 0.25
demag_commutation_spike: 3.0
steady_tail_fraction: 0.5

safety:
  max_current_a: 30.0
  max_motor_temp_c: 80.0
  max_rpm: 12000
  max_thrust_n: 35.0

smoke_gates:
  enabled: true
  min_throttle: 0.08
  min_running_fraction: 0.90
  max_bemf_latch_samples: 0
  require_esc_drive_states: true
  min_esc_drive_fraction: 0.90
  max_illegal_edges: 0
  # deliberately loose floors - first characterization of this pairing
  min_rpm:
    0.2: 2000
    0.3: 3000
    0.4: 3800
    0.5: 4500

segments:
  - {label: idle,    throttle: 0.00, duration_s: 2.0}
  - {label: ramp10,  throttle: 0.10, duration_s: 3.0, ramp: true}
  - {label: hold10,  throttle: 0.10, duration_s: 4.0, steady: true}
  - {label: ramp20,  throttle: 0.20, duration_s: 3.0, ramp: true}
  - {label: hold20,  throttle: 0.20, duration_s: 4.0, steady: true}
  - {label: ramp30,  throttle: 0.30, duration_s: 3.0, ramp: true}
  - {label: hold30,  throttle: 0.30, duration_s: 4.0, steady: true}
  - {label: ramp40,  throttle: 0.40, duration_s: 3.0, ramp: true}
  - {label: hold40,  throttle: 0.40, duration_s: 4.0, steady: true}
  - {label: ramp50,  throttle: 0.50, duration_s: 3.0, ramp: true}
  - {label: hold50,  throttle: 0.50, duration_s: 5.0, steady: true}
  - {label: rampdn,  throttle: 0.00, duration_s: 4.0, ramp: true}
  - {label: stop,    throttle: 0.00, duration_s: 2.0}
