name: sitl_cal_sweep
description: >
  SITL-calibration steady staircase matching tridge's esc_measure sweep
  profile: 0.05..0.50 in 0.05 steps, 4 s holds, up then down. Produces the
  sweep1.jsonl shape after samples_to_sitl_jsonl.py conversion.

  Default safety is for JS 2807 1300KV + Gemfan 7035-3 on ~6S (prop on).
  For noprop free-run raise max_rpm and lower max_current_a / max_thrust_n.
  ~90 s of spinning.
sample_rate_hz: 100
arm_settle_s: 2.0
steady_tail_fraction: 0.5
pole_pairs: 7

safety:
  max_current_a: 60.0
  max_thrust_n: 40.0
  max_rpm: 28000
  max_motor_temp_c: 95.0

segments:
  - {label: idle,   throttle: 0.00, duration_s: 2.0}
  # up
  - {label: t05,    throttle: 0.05, duration_s: 4.0, ramp: true,  steady: true}
  - {label: t10,    throttle: 0.10, duration_s: 4.0, steady: true}
  - {label: t15,    throttle: 0.15, duration_s: 4.0, steady: true}
  - {label: t20,    throttle: 0.20, duration_s: 4.0, steady: true}
  - {label: t25,    throttle: 0.25, duration_s: 4.0, steady: true}
  - {label: t30,    throttle: 0.30, duration_s: 4.0, steady: true}
  - {label: t35,    throttle: 0.35, duration_s: 4.0, steady: true}
  - {label: t40,    throttle: 0.40, duration_s: 4.0, steady: true}
  - {label: t45,    throttle: 0.45, duration_s: 4.0, steady: true}
  - {label: t50,    throttle: 0.50, duration_s: 4.0, steady: true}
  # down (same holds so plot alignment matches tridge captures)
  - {label: t45d,   throttle: 0.45, duration_s: 4.0, steady: true}
  - {label: t40d,   throttle: 0.40, duration_s: 4.0, steady: true}
  - {label: t35d,   throttle: 0.35, duration_s: 4.0, steady: true}
  - {label: t30d,   throttle: 0.30, duration_s: 4.0, steady: true}
  - {label: t25d,   throttle: 0.25, duration_s: 4.0, steady: true}
  - {label: t20d,   throttle: 0.20, duration_s: 4.0, steady: true}
  - {label: t15d,   throttle: 0.15, duration_s: 4.0, steady: true}
  - {label: t10d,   throttle: 0.10, duration_s: 4.0, steady: true}
  - {label: t05d,   throttle: 0.05, duration_s: 4.0, steady: true}
  - {label: rampdn, throttle: 0.00, duration_s: 3.0, ramp: true}
  - {label: stop,   throttle: 0.00, duration_s: 2.0}
