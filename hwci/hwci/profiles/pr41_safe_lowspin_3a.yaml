name: pr41_safe_lowspin_3a
description: >
  PR #41 first hardware validation on a current-limited ~3 A supply.
  Matches the healthy ch2 ark-release lowspin ladder (8/12/15/20%) so we
  can compare CLOSED_LOOP entry and current without climbing high duty.
  Host current abort is just above the brick OCP; the supply is the
  primary energy backstop. Do not use a pack with this profile.
sample_rate_hz: 100
arm_settle_s: 3.0
pole_pairs: 7
steady_tail_fraction: 0.6

safety:
  # 3.2 A bench brick is the real current backstop. Host abort sits a
  # little above so a single hall glitch does not kill a clean run, but
  # sustained over-current still trips.
  max_current_a: 4.0
  max_motor_temp_c: 70.0
  max_rpm: 12000
  max_thrust_n: 2.0

smoke_gates:
  enabled: true
  min_throttle: 0.08
  min_running_fraction: 0.85
  max_bemf_latch_samples: 0
  require_esc_drive_states: true
  min_esc_drive_fraction: 0.85
  max_illegal_edges: 0
  min_rpm:
    0.12: 1500
    0.15: 2500
    0.20: 3500

segments:
  - {label: idle,    throttle: 0.00, duration_s: 2.0}
  - {label: ramp08,  throttle: 0.08, duration_s: 2.0, ramp: true}
  - {label: hold08,  throttle: 0.08, duration_s: 4.0, steady: true}
  - {label: ramp12,  throttle: 0.12, duration_s: 2.0, ramp: true}
  - {label: hold12,  throttle: 0.12, duration_s: 4.0, steady: true}
  - {label: ramp15,  throttle: 0.15, duration_s: 2.0, ramp: true}
  - {label: hold15,  throttle: 0.15, duration_s: 4.0, steady: true}
  - {label: ramp20,  throttle: 0.20, duration_s: 2.0, ramp: true}
  - {label: hold20,  throttle: 0.20, duration_s: 4.0, steady: true}
  - {label: rampdn,  throttle: 0.00, duration_s: 3.0, ramp: true}
  - {label: stop,    throttle: 0.00, duration_s: 2.0}
