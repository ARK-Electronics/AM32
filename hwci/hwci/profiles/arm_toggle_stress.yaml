name: arm_toggle_stress
description: >
  Field-report reproduction: "arms every other toggle of the arm switch"
  (Betaflight, bidir on AND off, multiple FCs and AM32 ESCs). Model under
  test: the ESC silently loses its armed state once per spin/stop cycle
  (signal-timeout NVIC_SystemReset, IWDG, or hard fault), and AM32's re-arm
  needs 1 s of CONTINUOUS zero throttle - so an arm attempt that begins
  while the ESC is unarmed sees only nonzero idle throttle and stays dead
  for the whole attempt, then the following zero gap re-arms it: strict
  alternation. startup_reliability's 2.5 s gaps are long enough to hide a
  reboot+re-arm (reset ~0.3 s + 1 s zeros), which would explain its 10/10
  pass despite the field failures. This profile interleaves SHORT zero gaps
  (0.6-1.2 s, too short to silently re-arm) with long ones (2.5 s control).
  Diagnosis is host-side: a start segment where perf_running never asserts
  = failed "arm"; perf-struct counters resetting to zero mid-run
  (loop_iters/boot) = ESC rebooted; pair with an SWD read of RCC->CSR reset
  flags after the run to classify SW vs IWDG vs POR reset cause.
sample_rate_hz: 100
arm_settle_s: 3.0
steady_tail_fraction: 0.5

safety:
  max_current_a: 20.0
  max_thrust_n: 8.0
  max_rpm: 20000

segments:
  - {label: idle,     throttle: 0.00, duration_s: 2.0}
  # control pair: long gap, should always start (matches startup_reliability)
  - {label: start1,   throttle: 0.08, duration_s: 2.0}
  - {label: off1long, throttle: 0.00, duration_s: 2.5}
  - {label: start2,   throttle: 0.08, duration_s: 2.0}
  # short-gap ladder: if the ESC reboots per cycle, these starts go dead
  - {label: off2s,    throttle: 0.00, duration_s: 0.6}
  - {label: start3,   throttle: 0.08, duration_s: 2.0}
  - {label: off3s,    throttle: 0.00, duration_s: 0.9}
  - {label: start4,   throttle: 0.08, duration_s: 2.0}
  - {label: off4s,    throttle: 0.00, duration_s: 1.2}
  - {label: start5,   throttle: 0.08, duration_s: 2.0}
  # recovery check: long gap again - a dead ESC that re-arms here proves the
  # 1 s continuous-zero re-arm model (vs a hard wedge needing power cycle)
  - {label: off5long, throttle: 0.00, duration_s: 2.5}
  - {label: start6,   throttle: 0.08, duration_s: 2.0}
  # second short burst at the tightest cadence, back to back
  - {label: off6s,    throttle: 0.00, duration_s: 0.6}
  - {label: start7,   throttle: 0.08, duration_s: 2.0}
  - {label: off7s,    throttle: 0.00, duration_s: 0.6}
  - {label: start8,   throttle: 0.08, duration_s: 2.0}
  - {label: off8long, throttle: 0.00, duration_s: 2.5}
  - {label: start9,   throttle: 0.08, duration_s: 2.0}
  - {label: stop,     throttle: 0.00, duration_s: 2.0}
