name: bdshot_smoke
description: >
  No-prop free-run smoke intended for bidirectional DShot (BDShot) baseline
  capture on main_instrumented. Gentle holds through 20/50/80 so SWD can
  sample dshot_telem_mode, RX good/bad, and TX frame counters while a BDShot
  host (e.g. ARK FPV + PX4) drives the signal line. Flight Stand throttle is
  unidirectional — use this profile only when throttle_backend can emit
  BDShot (external generator or PX4 host); with stand DShot you will still
  get uni-directional counters (telem_mode stays 0). ~35 s.
sample_rate_hz: 100
arm_settle_s: 3.0
pole_pairs: 7
demag_rpm_drop_fraction: 0.25
demag_commutation_spike: 3.0
steady_tail_fraction: 0.5

safety:
  # No-prop free-run; host current is a backstop, not a tight limit.
  max_current_a: 50.0
  max_motor_temp_c: 90.0
  max_rpm: 55000
  max_thrust_n: 2.0

segments:
  - {label: idle,    throttle: 0.00, duration_s: 2.0}
  - {label: ramp20,  throttle: 0.20, duration_s: 3.0, ramp: true}
  - {label: hold20,  throttle: 0.20, duration_s: 4.0, steady: true}
  - {label: ramp50,  throttle: 0.50, duration_s: 4.0, ramp: true}
  - {label: hold50,  throttle: 0.50, duration_s: 5.0, steady: true}
  - {label: ramp80,  throttle: 0.80, duration_s: 4.0, ramp: true}
  - {label: hold80,  throttle: 0.80, duration_s: 5.0, steady: true}
  - {label: rampdn,  throttle: 0.00, duration_s: 4.0, ramp: true}
  - {label: stop,    throttle: 0.00, duration_s: 2.0}
