# Full auto-tune for JS 2807 1300KV + Gemfan 7035-3 on ARK 4IN1 (6S).
# Same search shape as example.yaml; safety scaled for a 7" prop (more
# thrust/current than the 5" HQ5136 setup).
name: ark4in1-2807-7035
description: >
  Tune advance/pwm/mode/ramp for JS Technology 2807 1300KV + Gemfan 7035-3
  on the ARK 4IN1 bench. Stock AM32 settings (except motor_kv=1300) are the
  baseline; objective is g/W at cruise-heavy weights.

battery_cells: 6

pack:
  min_resting_cell_v: 3.5
  prompt_on_swap: true

thermal:
  max_start_fet_temp_c: 60.0

probe:
  # t60 not t70: keep clear of any mid-band desync; 7" load lowers eRPM vs 5".
  points: {t30: 0.30, t50: 0.50, t60: 0.60, t90: 0.90}
  dwell_s: 4.0
  safety:
    max_current_a: 90.0
    max_thrust_n: 50.0       # 7" static thrust can exceed the 5" 16 N cap
    max_rpm: 28000

objective:
  weights: {t30: 1.0, t50: 2.0, t60: 1.0, t90: 0.5}
  min_power_w: 20.0
  noise_floor_pct: 2.0

constraints:
  max_demag_events: 0
  max_bemf_timeout_samples: 0
  jitter_max_regression_pct: 25.0
  max_fet_temp_c: 95.0
  max_motor_temp_c: 100.0
  startup:
    cycles: 5
    max_failed: 0
    spin_throttle: 0.15
    min_rpm: 800

anchors_every: 6

parameters:
  advance_level:
    values: [14, 18, 22, 26, 30, 34, 38]
    refine_step: 2
  pwm_frequency:
    values: [8, 16, 24, 48]
  variable_pwm: {values: [0, 1, 2]}
  auto_advance: {values: [0, 1]}

stages:
  - name: advance
    sweep: advance_level
    search: climb
  - name: pwm
    sweep: pwm_frequency
    search: climb
    fixed: {variable_pwm: 0}
  - name: modes
    ab_candidates:
      - {}
      - {variable_pwm: 1}
      - {variable_pwm: 2}
      - {auto_advance: 1}
    repeats: 2
  - name: advance_polish
    sweep: advance_level
    search: climb
    polish_radius: 4
  - name: ramp
    measure: ramp_rate
    margin: 0.8

finals:
  profile: efficiency_sweep_7inch   # raised current/thrust vs 5" efficiency_sweep
  pattern: ABBA
  repeats: 1
  extra_repeats_if_close: 1
  min_delta_pct: 1.0
  startup_check: true
  high_throttle: 0.70
  high_throttle_dwell_s: 4.0
